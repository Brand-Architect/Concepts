<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. Middleton's | Artisanal Rapeseed Oils</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (v3 CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage: '#8DA399',
                        'sage-dark': '#5D6D66',
                        cream: '#FDFBF7',
                        ink: '#1A1A1A',
                        gold: '#E9C46A',
                        rapeseed: '#FFD700',
                    },
                    fontFamily: {
                        serif: ['"Cormorant Garamond"', 'serif'],
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['"Playfair Display"', 'serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #FDFBF7;
            color: #1A1A1A;
            font-family: 'Montserrat', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .critique-box {
            background: white;
            border-left: 4px solid #8DA399;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-radius: 0 1rem 1rem 0;
        }
        .glass-nav {
            background: rgba(141, 163, 153, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
        }
        .image-reveal {
            overflow: hidden;
            position: relative;
        }
        .image-reveal img {
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .image-reveal:hover img {
            transform: scale(1.05);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #FDFBF7;
        }
        ::-webkit-scrollbar-thumb {
            background: #8DA399;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const MotionLib = window.Motion || window.framerMotion || window.FramerMotion;
        const { motion, useScroll, useTransform, useInView } = MotionLib || {};

        const Reveal = ({ children, className, delay = 0, y = 20 }) => {
            const ref = useRef(null);
            const isInView = useInView ? useInView(ref, { once: true, margin: "-10% 0px" }) : true;

            if (!motion) return <div className={className}>{children}</div>;

            return (
                <motion.div
                    ref={ref}
                    initial={{ opacity: 0, y }}
                    animate={isInView ? { opacity: 1, y: 0 } : { opacity: 0, y }}
                    transition={{ duration: 0.8, ease: [0.16, 1, 0.3, 1], delay }}
                    className={className}
                >
                    {children}
                </motion.div>
            );
        };

        const CritiqueBox = ({ title, children, type = 'problem' }) => (
            <Reveal className="critique-box mb-8">
                <div className="flex items-start gap-4">
                    {type === 'problem' ? (
                        <i data-lucide="alert-circle" className="text-sage shrink-0 mt-1 w-6 h-6"></i>
                    ) : (
                        <i data-lucide="check-circle-2" className="text-gold shrink-0 mt-1 w-6 h-6"></i>
                    )}
                    <div>
                        <h4 className="font-serif text-xl mb-2 text-ink">{title}</h4>
                        <div className="text-sage-dark text-sm leading-relaxed">
                            {children}
                        </div>
                    </div>
                </div>
            </Reveal>
        );

        const SectionTitle = ({ subtitle, title, dark = false }) => (
            <div className="mb-16">
                <Reveal delay={0.1}>
                    <span className={`text-[0.7rem] uppercase tracking-[0.4em] ${dark ? 'text-sage' : 'text-sage-dark'} font-medium`}>
                        {subtitle}
                    </span>
                </Reveal>
                <Reveal delay={0.2}>
                    <h2 className={`mt-4 font-serif text-[clamp(2.5rem,5vw,4rem)] leading-[1.1] ${dark ? 'text-cream' : 'text-ink'}`}>
                        {title}
                    </h2>
                </Reveal>
            </div>
        );

        const App = () => {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const scrollYProgress = useScroll ? useScroll().scrollYProgress : { get: () => 0 };
            
            // Simplified scroll transforms for standalone
            const [heroY, setHeroY] = useState(0);
            const [heroOpacity, setHeroOpacity] = useState(1);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
                
                const handleScroll = () => {
                    const scrolled = window.scrollY;
                    setHeroY(scrolled * 0.3);
                    setHeroOpacity(Math.max(0, 1 - scrolled / 500));
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [isMenuOpen]);

            return (
                <div className="min-h-screen selection:bg-sage selection:text-cream bg-cream">
                    {/* NAVIGATION */}
                    <nav className="fixed top-0 left-0 right-0 z-50 px-6 md:px-12 py-6 flex justify-between items-center transition-all duration-300">
                        <div className="flex items-center gap-8">
                            <button className="md:hidden text-cream" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <i data-lucide={isMenuOpen ? "x" : "menu"} className="w-6 h-6"></i>
                            </button>
                            <a href="#" className="text-[0.65rem] uppercase tracking-[0.3em] font-medium text-cream hover:text-gold transition-colors hidden md:block">The Collection</a>
                            <a href="#" className="text-[0.65rem] uppercase tracking-[0.3em] font-medium text-cream hover:text-gold transition-colors hidden md:block">Our Story</a>
                        </div>
                        
                        <div className="flex items-center gap-8">
                            <a href="#" className="text-[0.65rem] uppercase tracking-[0.3em] font-medium text-cream hover:text-gold transition-colors hidden md:block">Stockists</a>
                            <button className="bg-cream text-sage-dark px-6 py-2.5 rounded-full text-[0.65rem] uppercase tracking-[0.2em] font-semibold hover:bg-gold hover:text-ink transition-all flex items-center gap-2">
                                Shop Now <i data-lucide="shopping-bag" className="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                    </nav>

                    {/* MOBILE MENU */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-40 bg-sage pt-32 px-10 flex flex-col gap-8 md:hidden">
                            {['The Collection', 'Our Story', 'Stockists', 'Recipes', 'Contact'].map((item) => (
                                <a key={item} href="#" className="text-2xl font-serif text-cream border-b border-cream/10 pb-4" onClick={() => setIsMenuOpen(false)}>
                                    {item}
                                </a>
                            ))}
                        </div>
                    )}

                    {/* HERO / HEADER SECTION */}
                    <section className="relative min-h-[90vh] flex items-center justify-center overflow-hidden bg-sage pt-20">
                        <div 
                            style={{ transform: `translateY(${heroY}px)`, opacity: heroOpacity }}
                            className="relative z-10 text-center px-6"
                        >
                            <Reveal delay={0.2} y={40}>
                                <a href="https://ibb.co/VYpG89Z3" target="_blank" rel="noopener noreferrer">
                                    <img 
                                        src="https://i.ibb.co/hF1Nv9jC/Mrs-Middleton-s-logo.png" 
                                        alt="Mrs. Middleton's Logo" 
                                        className="w-[min(650px,90vw)] mx-auto mb-12 animate-float brightness-0 invert"
                                        referrerPolicy="no-referrer"
                                    />
                                </a>
                            </Reveal>
                            
                            <Reveal delay={0.4}>
                                <p className="font-serif italic text-[clamp(1.5rem,3vw,2.5rem)] text-cream max-w-3xl mx-auto leading-relaxed">
                                    The gold standard of cold-pressed rapeseed oil.
                                </p>
                            </Reveal>
                            
                            <Reveal delay={0.6} className="mt-12">
                                <div className="flex flex-col items-center gap-4">
                                    <span className="text-[0.6rem] uppercase tracking-[0.5em] text-cream/60">Explore the Heritage</span>
                                    <div className="w-px h-16 bg-gradient-to-b from-cream to-transparent"></div>
                                </div>
                            </Reveal>
                        </div>

                        {/* BACKGROUND ELEMENTS */}
                        <div className="absolute inset-0 z-0 opacity-30">
                            <div className="absolute top-1/4 -left-20 w-96 h-96 bg-cream/20 rounded-full blur-3xl"></div>
                            <div className="absolute bottom-1/4 -right-20 w-96 h-96 bg-gold/20 rounded-full blur-3xl"></div>
                        </div>
                    </section>

                    {/* BRAND CRITIQUE */}
                    <section className="py-32 px-6 md:px-12 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-24 items-start">
                                <div>
                                    <SectionTitle 
                                        subtitle="The Challenge" 
                                        title="Refining the Visual Identity" 
                                    />
                                    <CritiqueBox title="The Logo Detail Issue">
                                        The small bird emblem in the current logo is beautifully intricate, but it presents a significant technical challenge. When reduced for mobile screens or small packaging labels, these fine lines will inevitably "blob" together, losing all definition and looking like an accidental mark rather than a premium seal.
                                    </CritiqueBox>
                                    <CritiqueBox title="Visual Hierarchy">
                                        The current website lacks a clear focal point. Artisanal products like yours need space to breathe. By introducing an editorial layout, we allow the quality of the oil to be the hero, rather than competing with cluttered navigation and small text.
                                    </CritiqueBox>
                                    <CritiqueBox title="Color Story" type="solution">
                                        We've moved away from generic web colors to a palette that reflects the product's origin: Sage greens for the fields, deep golds for the rapeseed flower, and warm creams for the artisanal heritage.
                                    </CritiqueBox>
                                </div>
                                <div className="sticky top-32">
                                    <div className="aspect-square bg-sage rounded-3xl overflow-hidden shadow-2xl relative group border border-sage/10">
                                        <img 
                                            src="https://i.ibb.co/hF1Nv9jC/Mrs-Middleton-s-logo.png" 
                                            alt="Mrs. Middleton's Logo" 
                                            className="w-full h-full object-contain p-20 transition-transform duration-700 group-hover:scale-110 brightness-0 invert"
                                            referrerPolicy="no-referrer"
                                        />
                                        <div className="absolute inset-0 bg-ink/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                            <span className="bg-white px-6 py-3 rounded-full text-xs uppercase tracking-widest font-bold shadow-lg">
                                                Detail Analysis
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* DESIGN SHOWCASE */}
                    <section className="py-32 px-6 md:px-12 bg-cream">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-24">
                                {/* PALETTE */}
                                <div>
                                    <SectionTitle 
                                        subtitle="The Palette" 
                                        title="Natural & Grounded" 
                                    />
                                    <div className="flex flex-wrap gap-6">
                                        {[
                                            { color: 'bg-sage', label: 'Primary Brand' },
                                            { color: 'bg-gold', label: 'Product Accent' },
                                            { color: 'bg-sage-dark', label: 'Deep Earth' },
                                            { color: 'bg-cream', label: 'Heritage Base', border: true },
                                            { color: 'bg-ink', label: 'Typography' }
                                        ].map((item, i) => (
                                            <Reveal key={i} delay={i * 0.1} className="text-center">
                                                <div className={`w-24 h-24 rounded-full ${item.color} ${item.border ? 'border border-sage/20' : ''} mb-4 shadow-inner`}></div>
                                                <span className="text-[0.6rem] uppercase tracking-widest text-sage-dark/60 font-bold">{item.label}</span>
                                            </Reveal>
                                        ))}
                                    </div>
                                </div>

                                {/* TYPOGRAPHY */}
                                <div>
                                    <SectionTitle 
                                        subtitle="Typography" 
                                        title="Elevated Authority" 
                                    />
                                    <Reveal delay={0.3} className="space-y-12">
                                        <div className="border-l-2 border-sage pl-8">
                                            <h3 className="font-serif text-5xl mb-4">Classical Serif</h3>
                                            <p className="text-sage-dark/60 leading-relaxed italic">
                                                "The use of a high-contrast serif signals heritage and artisanal quality. It creates a sense of time and place, essential for a product with such deep roots in the English countryside."
                                            </p>
                                        </div>
                                        <div className="border-l-2 border-sage pl-8">
                                            <h3 className="font-sans text-3xl font-light uppercase tracking-widest mb-4">Modern Sans</h3>
                                            <p className="text-sage-dark/60 leading-relaxed">
                                                A clean, geometric sans-serif provides the necessary modern counterpoint, ensuring the brand feels relevant for today's high-end retail environments like Selfridges or Harrods.
                                            </p>
                                        </div>
                                    </Reveal>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* PRODUCT SHOWCASE */}
                    <section className="py-32 px-6 md:px-12 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <SectionTitle 
                                subtitle="The Collection" 
                                title="Cold Pressed Perfection" 
                            />

                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                {[
                                    { 
                                        name: "Original Cold Pressed", 
                                        desc: "The pure essence of our fields. Rich, nutty, and incredibly versatile.",
                                        img: "https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&q=80&w=800",
                                        accent: "bg-gold",
                                        label: "The Classic"
                                    },
                                    { 
                                        name: "Lemon Infused", 
                                        desc: "Zesty Mediterranean lemon oils blended with our signature rapeseed base.",
                                        img: "https://images.unsplash.com/photo-1590502593747-42a996133562?auto=format&fit=crop&q=80&w=800",
                                        accent: "bg-[#F4D35E]",
                                        label: "Zesty & Bright"
                                    },
                                    { 
                                        name: "Chilli Infused", 
                                        desc: "A sophisticated heat that builds gently. Perfect for finishing pizzas or pasta.",
                                        img: "https://images.unsplash.com/photo-1584269600464-37b1b58a9fe7?auto=format&fit=crop&q=80&w=800",
                                        accent: "bg-[#E63946]",
                                        label: "Bold & Spicy"
                                    },
                                    { 
                                        name: "Garlic Infused", 
                                        desc: "Rich, roasted garlic notes that add depth to every culinary creation.",
                                        img: "https://images.unsplash.com/photo-1598511757337-fe2cafc31ba0?auto=format&fit=crop&q=80&w=800",
                                        accent: "bg-[#D9C5B2]",
                                        label: "Savory & Rich"
                                    }
                                ].map((item, i) => (
                                    <Reveal key={item.name} delay={i * 0.15} className="group">
                                        <div className="image-reveal aspect-[2/3] bg-cream mb-6 rounded-2xl overflow-hidden shadow-xl">
                                            <img 
                                                src={item.img} 
                                                alt={item.name} 
                                                className="w-full h-full object-cover"
                                                referrerPolicy="no-referrer"
                                            />
                                            <div className={`absolute top-4 left-4 px-3 py-1 rounded-full ${item.accent} text-[0.5rem] uppercase tracking-widest font-bold text-ink shadow-sm`}>
                                                {item.label}
                                            </div>
                                        </div>
                                        <h3 className="font-serif text-xl mb-2">{item.name}</h3>
                                        <p className="text-xs text-sage-dark/70 leading-relaxed mb-4">{item.desc}</p>
                                        <button className="text-[0.6rem] uppercase tracking-[0.2em] font-bold text-sage flex items-center gap-2 group-hover:gap-3 transition-all">
                                            Shop Collection <i data-lucide="arrow-right" className="w-3 h-3"></i>
                                        </button>
                                    </Reveal>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* LIFESTYLE SECTION */}
                    <section className="py-32 px-6 md:px-12 bg-sage/5">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                <Reveal className="order-2 lg:order-1">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-4">
                                            <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&q=80&w=800" alt="Salad 1" className="rounded-2xl w-full aspect-[4/5] object-cover shadow-lg" referrerPolicy="no-referrer" />
                                            <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&q=80&w=800" alt="Salad 2" className="rounded-2xl w-full aspect-square object-cover shadow-lg" referrerPolicy="no-referrer" />
                                        </div>
                                        <div className="space-y-4 pt-12">
                                            <img src="https://images.unsplash.com/photo-1505253716362-afaea1d3d1af?auto=format&fit=crop&q=80&w=800" alt="Salad 3" className="rounded-2xl w-full aspect-square object-cover shadow-lg" referrerPolicy="no-referrer" />
                                            <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&q=80&w=800" alt="Salad 4" className="rounded-2xl w-full aspect-[4/5] object-cover shadow-lg" referrerPolicy="no-referrer" />
                                        </div>
                                    </div>
                                </Reveal>
                                <div className="order-1 lg:order-2 lg:pl-12">
                                    <SectionTitle 
                                        subtitle="The Experience" 
                                        title="Elevate Every Dish" 
                                    />
                                    <Reveal delay={0.3}>
                                        <p className="text-sage-dark leading-relaxed mb-8 text-lg font-serif italic">
                                            "Our oil isn't just an ingredient; it's the finishing touch that transforms a simple salad into a culinary event. The high smoke point and delicate flavor profile make it the most versatile tool in your kitchen."
                                        </p>
                                        <div className="flex gap-4">
                                            <i data-lucide="instagram" className="text-sage hover:text-gold cursor-pointer transition-colors w-6 h-6"></i>
                                            <i data-lucide="facebook" className="text-sage hover:text-gold cursor-pointer transition-colors w-6 h-6"></i>
                                            <i data-lucide="mail" className="text-sage hover:text-gold cursor-pointer transition-colors w-6 h-6"></i>
                                        </div>
                                    </Reveal>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-ink text-cream py-24 px-6 md:px-12">
                        <div className="max-w-7xl mx-auto text-center">
                            <Reveal>
                                <img 
                                    src="https://i.ibb.co/hF1Nv9jC/Mrs-Middleton-s-logo.png" 
                                    alt="Mrs. Middleton's Logo" 
                                    className="h-20 w-auto mx-auto mb-12 brightness-0 invert"
                                    referrerPolicy="no-referrer"
                                />
                            </Reveal>
                            
                            <Reveal delay={0.2}>
                                <h3 className="font-serif text-3xl mb-8 italic">Crafting the future of artisanal heritage.</h3>
                            </Reveal>

                            <Reveal delay={0.4} className="mb-12">
                                <a href="mailto:stephen@brandarchitect.cc" className="text-sage hover:text-gold transition-colors text-lg tracking-widest uppercase">
                                    stephen@brandarchitect.cc
                                </a>
                            </Reveal>

                            <div className="w-full h-px bg-cream/10 mb-12"></div>

                            <Reveal delay={0.6} className="flex flex-col md:flex-row justify-between items-center gap-8 text-[0.6rem] uppercase tracking-[0.4em] text-cream/40">
                                <span>© 2026 Mrs. Middleton's Artisanal Oils</span>
                                <span className="text-sage font-bold">Brand Architect · Designing Authority</span>
                                <div className="flex gap-8">
                                    <a href="#" className="hover:text-cream transition-colors">Privacy</a>
                                    <a href="#" className="hover:text-cream transition-colors">Terms</a>
                                </div>
                            </Reveal>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
